name: Release ARM64 Debian Package

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  build-arm64-deb:
    name: Build arm64 .deb package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set package version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" =~ ^refs/tags/v([0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.+-]+)?)$ ]]; then
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU emulation
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/arm64

      - name: Build and package in Ubuntu arm64 container
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm --platform linux/arm64 \
            -e DEB_VERSION="${{ steps.version.outputs.version }}" \
            -v "${{ github.workspace }}:/work" -w /work \
            ubuntu:22.04 bash -lc '
              set -euo pipefail
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential cmake ninja-build g++ pkg-config dpkg-dev \
                libsqlite3-dev libgpiod-dev libssl-dev libnfc-dev \
                libcurl4-openssl-dev libfmt-dev nlohmann-json3-dev \
                libc-ares-dev libfreetype6-dev ca-certificates git

              cmake -S . -B build-arm64 -G Ninja -DCMAKE_BUILD_TYPE=Release -DUNIX_FOLDER_CONVENTION=ON
              cmake --build build-arm64 --config Release -j$(nproc)

              rm -rf pkgroot dist
              mkdir -p pkgroot/DEBIAN dist
              cmake --install build-arm64 --prefix /work/pkgroot/opt/fuelflux

              mkdir -p /work/pkgroot/opt/fuelflux/deploy
              cp -a deploy/. /work/pkgroot/opt/fuelflux/deploy/
              chmod 755 /work/pkgroot/opt/fuelflux/deploy/install.sh

              install -m 0644 /work/deploy/debian/control /work/pkgroot/DEBIAN/control
              sed -i "s/@DEB_VERSION@/${DEB_VERSION}/g; s/@DEB_ARCH@/arm64/g" /work/pkgroot/DEBIAN/control
              install -m 0755 /work/deploy/debian/postinst /work/pkgroot/DEBIAN/postinst
              install -m 0755 /work/deploy/debian/prerm /work/pkgroot/DEBIAN/prerm

              dpkg-deb --build --root-owner-group /work/pkgroot "/work/dist/fuelflux_${DEB_VERSION}_arm64.deb"
            '

      - name: Test Debian install/uninstall in Ubuntu arm64 container
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}:/work" -w /work \
            ubuntu:22.04 bash -lc '
              set -euo pipefail
              apt-get update
              apt-get install -y --no-install-recommends \
                ca-certificates passwd adduser \
                libsqlite3-0 libgpiod2 libssl3 libnfc6 libcurl4 libfmt8 libstdc++6

              cat > /usr/local/bin/systemctl << "EOF"
              #!/bin/sh
              exit 0
              EOF
              chmod 755 /usr/local/bin/systemctl

              shopt -s nullglob
              deb_packages=(/work/dist/fuelflux_*_arm64.deb)
              if [[ "${#deb_packages[@]}" -ne 1 ]]; then
                echo "Expected exactly one ARM64 package, found ${#deb_packages[@]}" >&2
                exit 1
              fi
              dpkg -i "${deb_packages[0]}"

              test -x /opt/fuelflux/bin/fuelflux
              test -x /opt/fuelflux/deploy/install.sh
              getent passwd fuelflux > /dev/null

              dpkg -r fuelflux
            '

      - name: Upload arm64 deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: fuelflux-deb-arm64
          path: dist/*.deb
          if-no-files-found: error

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-arm64-deb
    runs-on: ubuntu-latest

    steps:
      - name: Download deb artifact
        uses: actions/download-artifact@v8
        with:
          name: fuelflux-deb-arm64
          path: dist

      - name: Publish release assets
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
