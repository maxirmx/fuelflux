name: Release ARM64 Debian Package

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  build-arm64-deb:
    name: Build arm64 .deb package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set package version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" =~ ^refs/tags/v([0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.+-]+)?)$ ]]; then
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Build and package in Ubuntu arm64 container
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm --platform linux/arm64 \
            -e DEB_VERSION="${{ steps.version.outputs.version }}" \
            -v "${{ github.workspace }}:/work" -w /work \
            ubuntu:22.04 bash -lc '
              set -euo pipefail
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential cmake ninja-build g++ pkg-config dpkg-dev \
                libsqlite3-dev libgpiod-dev libssl-dev libnfc-dev \
                libcurl4-openssl-dev libfmt-dev nlohmann-json3-dev \
                libc-ares-dev libfreetype6-dev ca-certificates git

              cmake -S . -B build-arm64 -G Ninja -DCMAKE_BUILD_TYPE=Release -DUNIX_FOLDER_CONVENTION=ON
              cmake --build build-arm64 --config Release -j$(nproc)

              rm -rf pkgroot dist
              mkdir -p pkgroot/DEBIAN dist
              cmake --install build-arm64 --prefix /work/pkgroot/opt/fuelflux

              mkdir -p /work/pkgroot/opt/fuelflux/deploy
              cp -a deploy/. /work/pkgroot/opt/fuelflux/deploy/
              chmod 755 /work/pkgroot/opt/fuelflux/deploy/install.sh

              {
                printf '%s\n' \
                  "Package: fuelflux" \
                  "Version: ${DEB_VERSION}" \
                  "Section: utils" \
                  "Priority: optional" \
                  "Architecture: arm64" \
                  "Maintainer: sw.consulting <support@sw.consulting>" \
                  "Depends: libc6 (>= 2.35), libstdc++6, libsqlite3-0, libgpiod2, libssl3 | libssl1.1, libnfc6, libcurl4, libfmt9 | libfmt8 | libfmt7" \
                  "Description: FuelFlux controller software package" \
                  " FuelFlux controller software and deployment assets for ARM64 devices."
              } > /work/pkgroot/DEBIAN/control

              cat > /work/pkgroot/DEBIAN/postinst <<'EOF'
              #!/bin/bash
              set -euo pipefail

              if [[ "${1:-}" == "configure" ]]; then
                /opt/fuelflux/deploy/install.sh install /opt/fuelflux/bin/fuelflux
              fi
              EOF

              cat > /work/pkgroot/DEBIAN/prerm <<'EOF'
              #!/bin/bash
              set -euo pipefail

              if [[ -x /opt/fuelflux/deploy/install.sh ]]; then
                if ! /opt/fuelflux/deploy/install.sh stop; then
                  echo "Warning: failed to stop fuelflux service during package removal/upgrade" >&2
                fi
                if ! /opt/fuelflux/deploy/install.sh disable; then
                  echo "Warning: failed to disable fuelflux service during package removal/upgrade" >&2
                fi
              fi
              EOF

              chmod 755 /work/pkgroot/DEBIAN/postinst /work/pkgroot/DEBIAN/prerm

              dpkg-deb --build --root-owner-group /work/pkgroot "/work/dist/fuelflux_${DEB_VERSION}_arm64.deb"
            '

      - name: Upload arm64 deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: fuelflux-deb-arm64
          path: dist/*.deb
          if-no-files-found: error

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-arm64-deb
    runs-on: ubuntu-latest

    steps:
      - name: Download deb artifact
        uses: actions/download-artifact@v4
        with:
          name: fuelflux-deb-arm64
          path: dist

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
