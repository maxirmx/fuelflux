name: Build FuelFlux

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: '${{ github.workflow }}-${{ github.job }}-${{ github.head_ref || github.ref_name }}'
  cancel-in-progress: true    

jobs:
  build-x64:
    name: Build Ubuntu x64
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Restore CMake deps cache
        uses: actions/cache@v5
        with:
          path: build/_deps
          key: ${{ runner.os }}-fuelflux-cmake-deps-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-fuelflux-cmake-deps-

      - name: Install dependencies
        # Do not install spdlog library. It depends on specific version of fmt, and it may be different from what you have or get installed.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libsqlite3-dev libgpiod-dev \
               build-essential cmake ninja-build g++ ca-certificates git libssl-dev libnfc-dev   \
               libcurl4-openssl-dev libfmt-dev nlohmann-json3-dev libc-ares-dev libfreetype6-dev

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
                                          -DENABLE_TESTING=ON \
                                          -DCODE_COVERAGE=ON \
                                          -DTARGET_REAL_FLOW_METER=OFF \
                                          -DDISPLAY_TYPE=CONSOLE \
                                          -DUNIX_FOLDER_CONVENTION=OFF

      - name: Build
        run: cmake --build build --config Release -j$(nproc)

      - name: Run tests
        run: cd build && ctest --output-on-failure -C Release

      - name: Generate coverage report
        run: |
          # Install lcov if not present
          sudo apt-get install -y lcov
          # Capture coverage excluding test directories, dependencies, and system files from the start
          lcov --capture --directory build --output-file coverage.info \
            --exclude '*/tests/*' \
            --exclude '*_test.cpp' \
            --exclude '*test.cpp' \
            --exclude '*/build/_deps/*' \
            --exclude '/usr/*' \
            --exclude '*/CMakeFiles/*'
     

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
